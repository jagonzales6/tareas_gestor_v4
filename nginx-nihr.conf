# ==============================================================================
# nginx-nihr.conf — Proxy reverso para Gestor de Tareas NIHR v4
#
# INSTRUCCIONES:
#   1. Reemplaza YOUR_DOMAIN_OR_IP con tu dominio real (ej: tareas.mi-dominio.com)
#      o con la IP pública del servidor (ej: 203.0.113.45)
#   2. docker compose up -d  (nginx recoge este archivo automáticamente)
#
# Para HTTPS con Certbot (requiere un dominio real, no una IP):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d tu-dominio.com
#   Después en backend/.env: HTTPS_ENABLED=true y ALLOWED_ORIGINS=https://tu-dominio.com
#   Luego: docker compose restart nihr-app
# ==============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name YOUR_DOMAIN_OR_IP;

    # Tamaño máximo de archivos subidos (multer acepta hasta 10 MB, margen de 5 MB)
    client_max_body_size 15M;

    # Logs (visibles con: docker compose logs nihr-nginx)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Proxy reverso hacia la app Node.js
    location / {
        proxy_pass         http://nihr-app:3000;
        proxy_http_version 1.1;

        # Headers para que Express conozca el protocolo y la IP real del cliente
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Soporte WebSocket (por si se agrega en el futuro)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts para operaciones largas (subida de archivos, reportes)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering off;
    }
}

